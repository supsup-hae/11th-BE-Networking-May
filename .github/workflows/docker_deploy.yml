name: docker_deploy

on:
  push:
    branches: [ "develop" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 리포지토리 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 환경변수(.env) 파일 생성
        run: |
          touch .env
          echo "SERVER_DB_URL=${{ secrets.SERVER_DB_URL }}" >> .env
          echo "SERVER_DB_USERNAME=${{ secrets.SERVER_DB_USERNAME }}" >> .env
          echo "SERVER_DB_PASSWORD=${{ secrets.SERVER_DB_PASSWORD }}" >> .env
          echo "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}" >> .env
          echo "DUST_API_KEY=${{ secrets.DUST_API_KEY }}" >> .env
      - name: gradlew 실행권한 설정
        run: chmod +x gradlew

      - name: Gradle 빌드
        uses: gradle/gradle-build-action@v3
        with:
          arguments: clean build -x test

      - name: 빌드 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: backend_team1
          path: build/libs/*.jar
          retention-days: 1
          compression-level: 0

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드
        run: docker build --platform linux/amd64 -t ${{ secrets.DOCKERHUB_USERNAME }}/backend_team1 .

      - name: Docker 이미지 푸시
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend_team1:latest


  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: docker-compose 파일 생성 및 배포
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu
            cat > docker-compose.yml <<EOL
            services:
              backend_team1:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/backend_team1:latest
                container_name: develop
                restart: unless-stopped
                ports:
                  - "8080:8080"
                environment:
                  - SERVER_DB_URL=${{ secrets.SERVER_DB_URL }}
                  - SERVER_DB_USERNAME=${{ secrets.SERVER_DB_USERNAME }}
                  - SERVER_DB_PASSWORD=${{ secrets.SERVER_DB_PASSWORD }}
                  - OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}
                  - DUST_API_KEY=${{ secrets.DUST_API_KEY }}
                  - TZ=Asia/Seoul
                networks:
                  - app-network

            networks:
              app-network:
                driver: bridge
            EOL

            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/backend_team1:latest
            sudo docker-compose down || true
            sudo docker-compose up -d
            sudo docker image prune -f

      - name: 새 컨테이너 헬스 체크
        run: |
          for i in {1..6}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${{ secrets.EC2_HOST }}:8080/actuator/health" || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "✅ [${i}회차] 헬스체크 성공 (HTTP 200) - 서비스가 정상적으로 동작 중입니다."
              exit 0
            elif [[ "$HTTP_CODE" == "401" ]]; then
              echo "⚠️ [${i}회차] 헬스체크 인증 필요 (HTTP 401) - 인증이 필요하지만 서버는 응답 중입니다."
              exit 0
            else
              echo "❌ [${i}회차] 헬스체크 실패 (HTTP 코드: $HTTP_CODE) - 30초 후 재시도합니다."
            fi
            sleep 30
          done
          echo "🛑 헬스체크 6회 시도 후 실패 - 서비스가 정상적으로 기동되지 않았습니다."
          exit 1

      - name: 배포 완료 알림
        run: |
          echo "배포가 완료되었습니다!"
